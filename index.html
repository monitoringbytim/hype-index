<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커뮤니티 하이프 인덱스</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-200:#85B7EB;--blue-400:#378ADD;--blue-600:#185FA5;--blue-800:#0C447C;--blue-900:#042C53;
  --red-50:#FCEBEB;--red-100:#F7C1C1;--red-200:#F09595;--red-400:#E24B4A;--red-600:#A32D2D;--red-800:#791F1F;
  --gray-50:#F1EFE8;--gray-100:#D3D1C7;--gray-200:#B4B2A9;--gray-400:#888780;--gray-600:#5F5E5A;--gray-800:#444441;
  --green-400:#639922;--green-600:#3B6D11;
  --tp:#1a1a18;--ts:#5F5E5A;--tt:#888780;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.13);
  --bg:#ffffff;--bg2:#F7F6F2;--bg3:#EFEDE8;
  --r8:8px;--r12:12px;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif; background:var(--bg2); color:var(--tp); line-height:1.6; min-height:100vh; }
.page { max-width:1100px; margin:0 auto; padding:2rem 1.5rem 4rem; }

/* header */
.page-header { margin-bottom:1.5rem; }
.tag { display:inline-block; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; background:var(--blue-50); color:var(--blue-600); margin-bottom:8px; }
.page-header h1 { font-size:24px; font-weight:600; margin-bottom:4px; }
.page-header p { font-size:14px; color:var(--ts); }

/* legend row */
.legend-row { display:flex; gap:20px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--ts); }
.legend-swatch { width:12px; height:12px; border-radius:2px; }
.legend-hint { margin-left:auto; font-size:11px; color:var(--tt); }

/* treemap */
.treemap-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r12); overflow:hidden; margin-bottom:1.25rem; }
.card-header { background:var(--bg2); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:0.5px solid var(--border); }
.card-header-title { font-size:13px; font-weight:600; color:var(--tp); }
.card-header-sub { font-size:12px; color:var(--tt); }
#treemap-wrap { width:100%; height:260px; position:relative; cursor:pointer; }
#treemap-wrap svg { display:block; }
.selected-bar { padding:8px 16px; background:var(--bg2); border-top:0.5px solid var(--border); font-size:12px; color:var(--tt); display:flex; gap:6px; flex-wrap:wrap; align-items:center; min-height:38px; }
.chip { display:inline-flex; align-items:center; gap:4px; background:var(--blue-50); color:var(--blue-800); border-radius:20px; padding:2px 9px 2px 7px; font-size:12px; font-weight:500; cursor:pointer; user-select:none; }
.chip .dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
.chip .x { opacity:.5; font-size:13px; line-height:1; }

/* bottom 2-col */
.bottom-row { display:grid; grid-template-columns:1fr 420px; gap:14px; align-items:start; }

/* chart panel */
.chart-panel { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r12); overflow:hidden; }
.chart-legend-row { display:flex; gap:14px; padding:10px 16px 0; flex-wrap:wrap; }
.chart-legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--ts); }
.chart-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.chart-area { padding:10px 16px 14px; position:relative; height:220px; }
.chart-empty { display:flex; align-items:center; justify-content:center; height:200px; font-size:13px; color:var(--tt); }

/* right panel */
.right-panel { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r12); overflow:hidden; }
.right-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; gap:8px; }
.right-empty-icon { font-size:28px; }
.right-empty-text { font-size:13px; color:var(--tt); text-align:center; line-height:1.6; }

/* source tabs */
.source-tabs { display:flex; border-bottom:0.5px solid var(--border); }
.stab { flex:1; padding:9px 6px; font-size:12px; font-weight:500; text-align:center; color:var(--tt); cursor:pointer; border-bottom:2px solid transparent; transition:color .15s; user-select:none; }
.stab.active { color:var(--blue-600); border-bottom-color:var(--blue-600); }
.stab:hover:not(.active) { color:var(--ts); }

/* content list */
.content-list { max-height:360px; overflow-y:auto; }
.content-item { display:flex; gap:10px; padding:10px 14px; border-bottom:0.5px solid var(--border); cursor:pointer; transition:background .1s; align-items:flex-start; }
.content-item:hover { background:var(--bg2); }
.content-item.selected-item { background:var(--blue-50); }
.content-item:last-child { border-bottom:none; }
.ci-thumb { width:44px; height:44px; border-radius:var(--r8); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
.ci-body { flex:1; min-width:0; }
.ci-title { font-size:13px; font-weight:500; color:var(--tp); line-height:1.4; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ci-meta { font-size:11px; color:var(--tt); display:flex; gap:8px; flex-wrap:wrap; }
.ci-badge { display:inline-block; font-size:10px; font-weight:600; padding:1px 6px; border-radius:10px; }
.badge-up { background:var(--blue-50); color:var(--blue-800); }
.badge-down { background:var(--red-50); color:var(--red-800); }
.ci-arrow { font-size:14px; color:var(--tt); align-self:center; flex-shrink:0; }

/* AI summary panel */
.ai-panel { display:none; }
.ai-panel.visible { display:block; }
.ai-header { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:0.5px solid var(--border); background:var(--bg2); }
.ai-back { font-size:12px; color:var(--blue-600); cursor:pointer; display:flex; align-items:center; gap:3px; font-weight:500; }
.ai-title { font-size:13px; font-weight:600; color:var(--tp); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ai-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; flex-shrink:0; }
.ai-body { padding:14px; }
.ai-source-row { display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.ai-stat { background:var(--bg2); border-radius:var(--r8); padding:8px 12px; font-size:12px; color:var(--ts); }
.ai-stat span { display:block; font-size:15px; font-weight:600; color:var(--tp); }
.ai-section-label { font-size:11px; font-weight:600; color:var(--tt); text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }
.ai-summary-box { background:var(--bg2); border-radius:var(--r8); padding:12px 14px; font-size:13px; color:var(--ts); line-height:1.7; margin-bottom:12px; }
.ai-points { list-style:none; display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.ai-points li { display:flex; gap:8px; font-size:13px; color:var(--ts); line-height:1.5; }
.ai-point-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:6px; }
.ai-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 14px; gap:10px; }
.spinner { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--blue-400); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* tooltip */
.tooltip { display:none; position:fixed; background:#fff; border:0.5px solid rgba(0,0,0,0.13); border-radius:var(--r8); padding:10px 13px; font-size:12px; pointer-events:none; z-index:999; min-width:150px; }
.tooltip-name { font-weight:600; font-size:13px; margin-bottom:3px; }
.tooltip-row { color:var(--ts); margin-bottom:1px; }
.tooltip-view { font-size:12px; font-weight:600; margin-top:4px; }

@media(max-width:780px){
  .bottom-row { grid-template-columns:1fr; }
}
</style>
</head>

<div class="page">

</div>

function getColor(b) {

  if(b>=60) return {bg:"#185FA5",text:"#E6F1FB",sub:"#B5D4F4"};
  if(b>=53) return {bg:"#378ADD",text:"#E6F1FB",sub:"#B5D4F4"};
  if(b>47)  return {bg:"#B4B2A9",text:"#F1EFE8",sub:"#D3D1C7"};
  if(b>=40) return {bg:"#F7C1C1",text:"#791F1F",sub:"#A32D2D"};
  if(b>=30) return {bg:"#E24B4A",text:"#FCEBEB",sub:"#F7C1C1"};
  return      {bg:"#A32D2D",text:"#F7C1C1",sub:"#F09595"};
}

const CHART_COLORS=["#185FA5","#E24B4A","#1D9E75","#BA7517","#534AB7","#993556"];
let selected=[], chartInst=null, activeStock=null, activeTab="텔레그램";

function genTS(bullish) {
  let v=100, arr=[];
  for(let i=0;i<30;i++){
    v += (bullish-50)*0.05 + (Math.random()-.47)*5;
    v = Math.max(65,Math.min(155,v));
    arr.push(Math.round(v*10)/10);
  }
  return arr;
}
const tsData={};
STOCKS.forEach(s=>{ tsData[s.name]=genTS(s.bullish); });
const labels=Array.from({length:30},(_,i)=>{
  const d=new Date(); d.setDate(d.getDate()-(29-i));
  return `${d.getMonth()+1}/${d.getDate()}`;
});

// treemap
const wrap=document.getElementById("treemap-wrap");
const W=wrap.clientWidth||900, H=260;
const root=d3.hierarchy({children:STOCKS}).sum(d=>d.volume);
d3.treemap().size([W,H]).padding(2).round(true)(root);
const svg=d3.select("#treemap-wrap").append("svg").attr("width",W).attr("height",H).style("display","block");
const tooltip=document.getElementById("tooltip");

const cell=svg.selectAll("g").data(root.leaves()).join("g")
  .attr("transform",d=>`translate(${d.x0},${d.y0})`)
  .style("cursor","pointer")
  .on("click",(ev,d)=>toggleStock(d.data.name))
  .on("mousemove",(ev,d)=>{
    const b=d.data.bullish, dir=b>=55?"상승":b<=45?"하락":"중립";
    const dc=b>=55?"#185FA5":b<=45?"#A32D2D":"#888780";
    tooltip.style.display="block";
    tooltip.style.left=(ev.clientX+14)+"px";
    tooltip.style.top=(ev.clientY-10)+"px";
    tooltip.innerHTML=`<div class="tooltip-name">${d.data.name}</div>
      <div class="tooltip-row">섹터: ${d.data.sector}</div>
      <div class="tooltip-row">콘텐츠: ${d.data.volume.toLocaleString()}건</div>
      <div class="tooltip-view" style="color:${dc}">${dir} 전망 ${b}%</div>`;
  })
  .on("mouseleave",()=>{ tooltip.style.display="none"; });

cell.append("rect")
  .attr("width",d=>Math.max(0,d.x1-d.x0))
  .attr("height",d=>Math.max(0,d.y1-d.y0))
  .attr("fill",d=>getColor(d.data.bullish).bg)
  .attr("rx",3);

cell.each(function(d){
  const w=d.x1-d.x0, h=d.y1-d.y0, c=getColor(d.data.bullish), g=d3.select(this);
  if(w>50&&h>28){
    g.append("text").attr("x",w/2).attr("y",h/2-(h>52?8:0))
      .attr("text-anchor","middle").attr("dominant-baseline","middle")
      .attr("fill",c.text).attr("font-size",w>110?13:11).attr("font-weight",600)
      .attr("font-family","-apple-system,sans-serif").text(d.data.name);
  }
  if(w>65&&h>54){
    const b=d.data.bullish, dir=b>=55?`상승 ${b}%`:b<=45?`하락 ${100-b}%`:"중립";
    g.append("text").attr("x",w/2).attr("y",h/2+13)
      .attr("text-anchor","middle").attr("dominant-baseline","middle")
      .attr("fill",c.sub).attr("font-size",10).attr("font-family","-apple-system,sans-serif")
      .text(dir);
  }
});
svg.on("mouseleave",()=>{ tooltip.style.display="none"; });

function toggleStock(name){
  if(selected.includes(name)){
    selected=selected.filter(s=>s!==name);
  } else {
    if(selected.length>=6) selected.shift();
    selected.push(name);
  }
  updateSelectedBar();
  updateChart();
  // 가장 마지막 선택 종목을 우측 패널에
  if(selected.length>0){
    const last=selected[selected.length-1];
    showSourcePanel(STOCKS.find(s=>s.name===last));
  } else {
    showEmptyPanel();
  }
}

function updateSelectedBar(){
  const bar=document.getElementById("selected-bar");
  if(selected.length===0){
    bar.innerHTML='<span style="color:var(--tt)">종목을 클릭하면 시계열 차트에 표시됩니다</span>';
    return;
  }
  bar.innerHTML=selected.map((name,i)=>`
    <span class="chip" onclick="removeStock('${name}')">
      <span class="dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></span>
      ${name}<span class="x">×</span>
    </span>`).join("");
}

function removeStock(name){
  selected=selected.filter(s=>s!==name);
  updateSelectedBar();
  updateChart();
  if(selected.length>0){
    showSourcePanel(STOCKS.find(s=>s.name===selected[selected.length-1]));
  } else {
    showEmptyPanel();
  }
}

function updateChart(){
  const empty=document.getElementById("chart-empty");
  const canvas=document.getElementById("lineChart");
  const legendRow=document.getElementById("chart-legend-row");
  if(selected.length===0){
    empty.style.display="flex"; canvas.style.display="none";
    legendRow.innerHTML="";
    if(chartInst){ chartInst.destroy(); chartInst=null; }
    return;
  }
  empty.style.display="none"; canvas.style.display="block";
  legendRow.innerHTML=selected.map((name,i)=>`
    <div class="chart-legend-item">
      <div class="chart-dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></div>${name}
    </div>`).join("");
  const datasets=selected.map((name,i)=>({
    label:name, data:tsData[name],
    borderColor:CHART_COLORS[i%CHART_COLORS.length],
    backgroundColor:"transparent", borderWidth:2,
    pointRadius:0, pointHoverRadius:4, tension:.35,
  }));
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(canvas,{
    type:"line",
    data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(1)}`}}},
      scales:{
        x:{ticks:{maxTicksLimit:7,font:{size:11},color:"#888780",autoSkip:true},grid:{color:"rgba(0,0,0,0.04)"}},
        y:{min:65,max:155,ticks:{font:{size:11},color:"#888780"},grid:{color:"rgba(0,0,0,0.04)"}},
      }
    }
  });
}

function showEmptyPanel(){
  document.getElementById("right-empty").style.display="flex";
  document.getElementById("source-view").style.display="none";
  document.getElementById("ai-view").classList.remove("visible");
  activeStock=null;
}

function showSourcePanel(stock){
  activeStock=stock;
  document.getElementById("right-empty").style.display="none";
  document.getElementById("source-view").style.display="block";
  document.getElementById("ai-view").classList.remove("visible");
  document.getElementById("source-stock-name").textContent=stock.name;
  const total=stock.volume;
  document.getElementById("source-total").textContent=`콘텐츠 ${total.toLocaleString()}건`;
  renderTabs(stock);
  renderContentList(stock, activeTab);
}

function renderTabs(stock){
  const tabEl=document.getElementById("source-tabs");
  tabEl.innerHTML=Object.keys(SOURCES).map(src=>`
    <div class="stab ${src===activeTab?"active":""}" onclick="switchTab('${src}')">${SOURCES[src].icon} ${src}</div>
  `).join("");
}

function switchTab(tab){
  activeTab=tab;
  if(activeStock) { renderTabs(activeStock); renderContentList(activeStock,tab); }
  document.getElementById("ai-view").classList.remove("visible");
}

function renderContentList(stock, tab){
  const contents=makeContents(stock.name, stock.bullish)[tab];
  const list=document.getElementById("content-list");
  list.innerHTML=contents.map((c,i)=>{
    const badgeClass=c.view==="up"?"badge-up":c.view==="down"?"badge-down":"";
    const badgeText=c.view==="up"?"상승전망":c.view==="down"?"하락전망":"중립";
    const icon=tab==="유튜브"?"▶":tab==="텔레그램"?"📣":"✍";
    const iconBg=tab==="유튜브"?"#FFF0F0":tab==="텔레그램"?"#E8F4FD":"#FFF5EF";
    return `<div class="content-item" id="ci-${i}" onclick="openAI(${i},'${tab}')">
      <div class="ci-thumb" style="background:${iconBg}">${icon}</div>
      <div class="ci-body">
        <div class="ci-title">${c.title}</div>
        <div class="ci-meta">
          <span>${c.author}</span>
          <span>${c.views}</span>
          <span>${c.likes}</span>
          ${c.duration?`<span>${c.duration}</span>`:""}
          ${badgeClass?`<span class="ci-badge ${badgeClass}">${badgeText}</span>`:""}
        </div>
      </div>
      <div class="ci-arrow">›</div>
    </div>`;
  }).join("");
}

function openAI(idx, tab){
  const stock=activeStock;
  const contents=makeContents(stock.name, stock.bullish)[tab];
  const item=contents[idx];
  const aiView=document.getElementById("ai-view");
  const aiBody=document.getElementById("ai-body");
  document.getElementById("ai-title").textContent=item.title;
  const badge=document.getElementById("ai-badge");
  badge.textContent=item.view==="up"?"상승전망":item.view==="down"?"하락전망":"중립";
  badge.className="ai-badge "+(item.view==="up"?"badge-up":item.view==="down"?"badge-down":"");
  aiView.classList.add("visible");
  aiBody.innerHTML=`<div class="ai-loading"><div class="spinner"></div><div style="font-size:13px;color:var(--tt)">AI 요약 생성 중…</div></div>`;
  const summaryFn = item.type==="video"? AI_SUMMARIES.video : item.type==="post"? AI_SUMMARIES.post : AI_SUMMARIES.blog;
  const s=summaryFn(item.title, item.view);
  setTimeout(()=>{
    aiBody.innerHTML=`
      <div class="ai-source-row">
        <div class="ai-stat">조회수<span>${s.stats.views||s.stats.type}</span></div>
        <div class="ai-stat">반응<span>${s.stats.likes}</span></div>
        ${s.stats.duration?`<div class="ai-stat">길이<span>${s.stats.duration}</span></div>`:""}
      </div>
      <div class="ai-section-label">AI 핵심 요약</div>
      <div class="ai-summary-box">${s.summary}</div>
      <div class="ai-section-label">주요 포인트</div>
      <ul class="ai-points">
        ${s.points.map(p=>`<li><div class="ai-point-dot" style="background:${item.view==="up"?"#185FA5":item.view==="down"?"#E24B4A":"#888780"}"></div>${p}</li>`).join("")}
      </ul>
    `;
  }, 900);
}

function closeAI(){
  document.getElementById("ai-view").classList.remove("visible");
}
</script>
</body>
</html>
